<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 460" role="img" aria-label="Illustration of neighbors connecting with local skilled freelancers">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#EFF4FF"/>
      <stop offset="1" stop-color="#F9FAFB"/>
    </linearGradient>
  </defs>
  <rect width="600" height="460" rx="24" fill="url(#sky)"/>
  <!-- connecting lines -->
  <g stroke="#93B4F5" stroke-width="3" stroke-dasharray="6 8" fill="none">
    <path d="M150 150 Q300 60 450 150"/>
    <path d="M150 310 Q300 400 450 310"/>
    <path d="M150 150 L150 310"/>
    <path d="M450 150 L450 310"/>
  </g>
  <!-- center hub -->
  <circle cx="300" cy="230" r="56" fill="#2563EB"/>
  <line x1="284" y1="246" x2="316" y2="214" stroke="#10B981" stroke-width="9" stroke-linecap="round"/>
  <circle cx="284" cy="246" r="13" fill="#ffffff"/>
  <circle cx="316" cy="214" r="13" fill="#F59E0B"/>
  <!-- skill nodes -->
  <g font-family="Poppins, Segoe UI, sans-serif" font-size="22" font-weight="600" text-anchor="middle">
    <g><circle cx="150" cy="150" r="44" fill="#10B981"/><text x="150" y="158" fill="#fff">🔧</text></g>
    <g><circle cx="450" cy="150" r="44" fill="#F59E0B"/><text x="450" y="158" fill="#fff">🎨</text></g>
    <g><circle cx="150" cy="310" r="44" fill="#F59E0B"/><text x="150" y="318" fill="#fff">📚</text></g>
    <g><circle cx="450" cy="310" r="44" fill="#10B981"/><text x="450" y="318" fill="#fff">📷</text></g>
  </g>
</svg>
