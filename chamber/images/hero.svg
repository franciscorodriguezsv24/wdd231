<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="40%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="volcano" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="cityHaze" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="1600" height="900" fill="url(#sky)"/>

  <!-- Sun -->
  <circle cx="1180" cy="320" r="90" fill="#fff7a3" opacity="0.95"/>
  <circle cx="1180" cy="320" r="130" fill="#fff7a3" opacity="0.25"/>

  <!-- Distant mountains -->
  <path d="M0 580 Q200 480 400 540 T800 530 T1200 540 T1600 530 V900 H0 Z" fill="#7c3aed" opacity="0.35"/>

  <!-- El Boquerón volcano -->
  <path d="M100 720 L600 280 L680 360 L760 230 L850 360 L1500 720 Z" fill="url(#volcano)"/>
  <!-- Crater shadow -->
  <path d="M650 340 L760 240 L850 360 L820 380 L760 350 L680 380 Z" fill="#000" opacity="0.4"/>

  <!-- City skyline silhouette -->
  <g fill="#0f172a">
    <rect x="100" y="600" width="80" height="300"/>
    <rect x="200" y="540" width="60" height="360"/>
    <rect x="280" y="580" width="90" height="320"/>
    <rect x="390" y="500" width="70" height="400"/>
    <rect x="480" y="560" width="100" height="340"/>
    <rect x="600" y="520" width="80" height="380"/>
    <rect x="700" y="580" width="60" height="320"/>
    <rect x="780" y="490" width="120" height="410"/>
    <rect x="920" y="540" width="80" height="360"/>
    <rect x="1020" y="600" width="70" height="300"/>
    <rect x="1110" y="510" width="100" height="390"/>
    <rect x="1230" y="560" width="80" height="340"/>
    <rect x="1330" y="520" width="90" height="380"/>
    <rect x="1440" y="580" width="70" height="320"/>
  </g>

  <!-- Building windows -->
  <g fill="#fbbf24" opacity="0.75">
    <rect x="220" y="560" width="6" height="6"/>
    <rect x="240" y="560" width="6" height="6"/>
    <rect x="220" y="590" width="6" height="6"/>
    <rect x="240" y="590" width="6" height="6"/>
    <rect x="410" y="520" width="6" height="6"/>
    <rect x="430" y="520" width="6" height="6"/>
    <rect x="410" y="560" width="6" height="6"/>
    <rect x="430" y="560" width="6" height="6"/>
    <rect x="810" y="510" width="6" height="6"/>
    <rect x="830" y="510" width="6" height="6"/>
    <rect x="850" y="510" width="6" height="6"/>
    <rect x="810" y="550" width="6" height="6"/>
    <rect x="830" y="550" width="6" height="6"/>
    <rect x="850" y="550" width="6" height="6"/>
    <rect x="1130" y="530" width="6" height="6"/>
    <rect x="1150" y="530" width="6" height="6"/>
    <rect x="1170" y="530" width="6" height="6"/>
    <rect x="1130" y="570" width="6" height="6"/>
    <rect x="1170" y="570" width="6" height="6"/>
  </g>

  <!-- Foreground haze for text readability -->
  <rect y="500" width="1600" height="400" fill="url(#cityHaze)"/>
</svg>
