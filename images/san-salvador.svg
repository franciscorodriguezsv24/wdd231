<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#74c0fc"/>
      <stop offset="100%" stop-color="#a7e0ff"/>
    </linearGradient>
    <linearGradient id="volcano" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a6741"/>
      <stop offset="100%" stop-color="#2d4a2b"/>
    </linearGradient>
  </defs>
  <!-- sky -->
  <rect width="400" height="240" fill="url(#sky)"/>
  <!-- sun -->
  <circle cx="320" cy="60" r="22" fill="#fff7a3" opacity="0.9"/>
  <!-- back hills -->
  <path d="M0 170 Q80 130 160 160 T320 150 T400 165 V240 H0 Z" fill="#6c9a8b" opacity="0.6"/>
  <!-- San Salvador volcano (El Boquerón) -->
  <path d="M40 175 L150 70 L180 95 L210 60 L240 90 L360 175 Z" fill="url(#volcano)"/>
  <!-- crater shading -->
  <path d="M175 95 L210 65 L235 90 L215 105 L195 105 Z" fill="#3a5a35"/>
  <!-- ground -->
  <rect y="175" width="400" height="65" fill="#cfa97a"/>
  <!-- buildings -->
  <g fill="#37474f">
    <rect x="40" y="140" width="22" height="35"/>
    <rect x="70" y="125" width="18" height="50"/>
    <rect x="95" y="135" width="24" height="40"/>
    <rect x="270" y="130" width="20" height="45"/>
    <rect x="300" y="120" width="24" height="55"/>
    <rect x="335" y="138" width="18" height="37"/>
  </g>
  <!-- windows -->
  <g fill="#ffd54f" opacity="0.85">
    <rect x="74" y="132" width="3" height="3"/>
    <rect x="80" y="132" width="3" height="3"/>
    <rect x="74" y="142" width="3" height="3"/>
    <rect x="80" y="142" width="3" height="3"/>
    <rect x="304" y="128" width="3" height="3"/>
    <rect x="312" y="128" width="3" height="3"/>
    <rect x="304" y="140" width="3" height="3"/>
    <rect x="312" y="140" width="3" height="3"/>
  </g>
  <!-- El Salvador flag accent -->
  <g transform="translate(180, 195)">
    <rect width="40" height="5" fill="#0033a0"/>
    <rect y="5" width="40" height="5" fill="#fff"/>
    <rect y="10" width="40" height="5" fill="#0033a0"/>
  </g>
</svg>
